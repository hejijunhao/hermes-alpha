# Hermes Agent — stock CLI served via ttyd web terminal
# Deploy: fly deploy --config gateway/fly.toml --dockerfile gateway/Dockerfile
app = 'hermes-terminal'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
